spring:
  application:
    name: hcare-api
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  threads:
    virtual:
      enabled: true

server:
  port: 8080

hcare:
  jwt:
    secret: ${JWT_SECRET:dev-insecure-default-secret-not-for-production-use-must-be-at-least-256-bits}
    expiration-ms: 86400000
  portal:
    base-url: ${APP_BASE_URL:http://localhost:5173}
    trusted-proxy: ${PORTAL_TRUSTED_PROXY:false}
    # Set to "-" to disable (Spring scheduled task disable sentinel; used in tests via AbstractIntegrationTest)
    cleanup-cron: ${PORTAL_CLEANUP_CRON:0 0 3 * * *}
    jwt:
      expiration-days: ${PORTAL_JWT_EXPIRATION_DAYS:30}
      secret: ${PORTAL_JWT_SECRET:dev-insecure-portal-secret-not-for-production-use-must-be-at-least-256-bits}
  storage:
    provider: ${HCARE_STORAGE_PROVIDER:local}
    documents-dir: ${HCARE_DOCUMENTS_DIR:/var/hcare/documents}
    signing-key: ${HCARE_STORAGE_SIGNING_KEY:${JWT_SECRET:dev-insecure-default-secret-not-for-production-use-must-be-at-least-256-bits}}
    base-url: ${HCARE_BASE_URL:http://localhost:8080}
