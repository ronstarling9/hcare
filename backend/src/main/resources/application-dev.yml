spring:
  datasource:
    url: jdbc:h2:mem:hcaredb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: false
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

integration:
  encryption-key: ZGV2LWludGVnLWtleS1jaGFuZ2UtaW4tcHJvZCEhISE=  # dev-only 32-byte AES key; MUST be replaced in prod
  connectors:
    sandata:
      base-url: https://evv.sandata.com
      connect-timeout: 5s
      read-timeout: 30s
    hhaexchange:
      base-url: https://api.hhaexchange.com
      connect-timeout: 5s
      read-timeout: 30s
    stedi:
      base-url: https://healthcare.us.stedi.com/2024-04-01
      connect-timeout: 5s
      read-timeout: 60s
    viventium:
      base-url: https://api.viventium.com
      connect-timeout: 5s
      read-timeout: 30s

hcare:
  jwt:
    secret: dev-secret-key-change-in-prod-must-be-256-bits-minimum-length
    expiration-ms: 86400000
  storage:
    provider: local
    documents-dir: /tmp/hcare-dev-docs
    signing-key: dev-doc-signing-key-change-in-prod-must-be-256-bits
    base-url: http://localhost:8080
